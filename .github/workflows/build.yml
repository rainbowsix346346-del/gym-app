- name: Unzip project
        run: |
          unzip "gym-&-bodybuilding.zip" -d project
          ls project/

      - name: Grant execute permission for gradlew
        run: chmod +x project/gradlew

      - name: Build Debug APK
        run: cd project && ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gym-bodybuilding-debug
          path: project/app/build/outputs/apk/debug/*.apk
          retention-days: 7
